site_name: MeshCore Guide
site_description: >-
  A beginner-to-advanced narrative guide for MeshCore — mesh networking,
  operator workflows, the companion API, and codebase internals.
  Byte-level specs live at docs.meshcore.io; this guide teaches the mental models.
site_url: https://jjagoda.github.io/meshcore-guide/
repo_url: https://github.com/jjagoda/meshcore-guide
repo_name: jjagoda/meshcore-guide
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - content.code.copy
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.details
  - attr_list
  - md_in_html

